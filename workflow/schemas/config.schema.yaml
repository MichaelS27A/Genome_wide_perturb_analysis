$schema: "https://json-schema.org/draft/2020-12/schema"
title: X_Atlas Mixscape/Mixscale/PS pipeline config
type: object
required:
  - datasets
  - results_dir
  - conda_env
properties:
  datasets:
    type: object
    minProperties: 1
    additionalProperties:
      type: object
      additionalProperties: true
      properties:
        enabled:
          type: boolean
        h5ad:
          type: string
        guide_calls_csv:
          type: string
        pert_col:
          type: string
        control_label:
          type: string
        target_perturbation_list:
          type: string
  chunking:
    type: object
    additionalProperties: true
  mixscape:
    type: object
    additionalProperties: true
    properties:
      pca_dims:
        type: integer
      write_subset_h5ad:
        type: boolean
      use_hvg_for_pca:
        type: boolean
      batch_size:
        type: integer
      normalize_target_sum:
        type: number
      logfc_threshold:
        type: number
      pval_cutoff:
        type: number
  mixscale:
    type: object
    additionalProperties: true
    properties:
      use_hvg_for_pca:
        type: boolean
      normalize_target_sum:
        type: number
      logfc_threshold:
        type: number
      pval_cutoff:
        type: number
      min_de_genes:
        type: integer
      max_de_genes:
        type: integer
      batch_size:
        type: integer
  global_de:
    type: object
    additionalProperties: true
    properties:
      method:
        type: string
      normalize_target_sum:
        type: number
      log1p:
        type: boolean
      n_top_de_genes:
        type: integer
      min_cells_per_perturbation:
        type: integer
      max_control_cells:
        type: integer
      max_cells_per_perturbation:
        type: integer
      random_seed:
        type: integer
  ora:
    type: object
    additionalProperties: true
    properties:
      gmt_files:
        type: array
        items:
          type: string
      streams:
        type: array
        items:
          type: string
          enum: [mixscape, global_de, ps]
      fdr_alpha:
        type: number
      min_abs_logfc:
        type: number
      min_deg_genes:
        type: integer
      max_terms_per_direction:
        type: integer
      min_term_size:
        type: integer
      max_term_size:
        type: integer
  ps_de:
    type: object
    additionalProperties: true
    properties:
      score_column:
        type: string
      score_mode:
        type: string
        enum: [top_positive, top_negative, top_absolute]
      score_quantile:
        type: number
      min_selected_cells:
        type: integer
      max_control_cells:
        type: integer
      n_top_de_genes:
        type: integer
      random_seed:
        type: integer
  clustering:
    type: object
    additionalProperties: true
  target_random_clustering:
    type: object
    additionalProperties: true
    properties:
      deg_streams:
        type: array
        items:
          type: string
          enum: [global_de, mixscape, mixscale, ps]
      random_controls_match_target_count:
        type: boolean
      n_random_controls:
        type: integer
      min_abs_effect:
        type: number
      max_pval_adj:
        type: number
      rank_significant_max:
        type: integer
      top_genes_per_perturbation:
        type: integer
      min_feature_genes:
        type: integer
      assignment_logic:
        type: string
        enum: [intersection, union]
      mixscale_score_threshold:
        type: number
      max_control_cells:
        type: integer
      expression_normalize_target_sum:
        type: number
      expression_log1p:
        type: boolean
      heatmap_max_genes:
        type: integer
      heatmap_gene_order:
        type: string
        enum: [variance, absolute_mean]
      volcano_max_targets:
        type: integer
      recurrent_gene_fraction:
        type: number
      volcano_stream_priority:
        type: array
        items:
          type: string
          enum: [global_de, mixscape, mixscale, ps]
      linkage:
        type: string
      distance:
        type: string
      random_seed:
        type: integer
  postprocess:
    type: object
    additionalProperties: true
  audit:
    type: object
    additionalProperties: true
    properties:
      enabled:
        type: boolean
      require_ready:
        type: boolean
      require_raw_source:
        type: boolean
  methods:
    type: object
    additionalProperties: true
    properties:
      bootstrap_install:
        type: boolean
      mixscape:
        type: object
        additionalProperties: true
      mixscale:
        type: object
        additionalProperties: true
      ps:
        type: object
        additionalProperties: true
      global_de:
        type: object
        additionalProperties: true
      ora:
        type: object
        additionalProperties: true
      comparison:
        type: object
        additionalProperties: true
      target_random_clustering:
        type: object
        additionalProperties: true
  results_dir:
    type: string
  conda_env:
    type: string
  postprocess_conda_env:
    type: string
  r_env:
    type: string
  rscript_bin:
    type: string
additionalProperties: true
