# Public template config for X_Atlas Snakemake workflow.
# Replace paths/values with your local dataset locations.

datasets:
  HCT116:
    enabled: true
    h5ad: ../HCT116_filtered_dual_guide_cells.h5ad
    guide_calls_csv: ../HCT116_filtered_guide_calls_per_cell.csv.gz
    pert_col: gene_target
    control_label: Non-Targeting
    target_perturbation_list: config/targets/priority_joint_targets_all_cell_lines.txt

  HEK293T:
    enabled: true
    h5ad: ../HEK293T_filtered_dual_guide_cells.h5ad
    guide_calls_csv: ../HEK293T_filtered_guide_calls_per_cell.csv.gz
    pert_col: gene_target
    control_label: Non-Targeting
    target_perturbation_list: config/targets/priority_joint_targets_all_cell_lines.txt

  STEMCELL:
    enabled: true
    h5ad: ../../StemCellPerturb/data/KOLF_Pan_Genome_QC_Filtered_no_Y.h5ad
    pert_col: gene_target
    control_label: NTC
    # Do not cap genes for CSC-backed StemCell matrix; prior cap suppressed KO calls.
    csc_max_genes: 0
    csc_max_total_nnz: 0
    target_perturbation_list: config/targets/priority_joint_targets_all_cell_lines.txt

  K562_GWPS_RAW_FULL:
    enabled: true
    h5ad: ../../Genome_Wide_Perturb_SEQ/data/safe_extract/K562_gwps_raw_singlecell_01.h5ad
    pert_col: gene
    control_label: non-targeting
    target_perturbation_list: config/targets/priority_joint_targets_all_cell_lines.txt

  RPE1_RAW_FULL:
    enabled: true
    h5ad: ../../Genome_Wide_Perturb_SEQ/data/safe_extract/rpe1_raw_singlecell_01.h5ad
    pert_col: gene
    control_label: non-targeting
    target_perturbation_list: config/targets/priority_joint_targets_all_cell_lines.txt

chunking:
  perturbations_per_chunk: 128
  min_cells_per_perturbation: 30
  max_controls_per_chunk: 10000
  control_sample_seed: 0
  csv_read_chunk_size: 300000

mixscape:
  pca_dims: 20
  write_subset_h5ad: false
  use_hvg_for_pca: false
  csc_max_genes: 0
  csc_max_total_nnz: 0
  batch_size: 256
  normalize_target_sum: 10000
  logfc_threshold: 0.10
  pval_cutoff: 0.05

mixscale:
  use_hvg_for_pca: false
  csc_max_genes: 0
  csc_max_total_nnz: 0
  normalize_target_sum: 10000
  logfc_threshold: 0.10
  pval_cutoff: 0.05
  min_de_genes: 5
  max_de_genes: 100
  batch_size: 256

global_de:
  method: wilcoxon
  normalize_target_sum: 10000
  log1p: true
  n_top_de_genes: 2000
  min_cells_per_perturbation: 30
  max_control_cells: 0
  max_cells_per_perturbation: 0
  random_seed: 0

ora:
  gmt_files: []
  streams: [mixscape, global_de]
  fdr_alpha: 0.05
  min_abs_logfc: 0.25
  min_deg_genes: 10
  max_terms_per_direction: 50
  min_term_size: 5
  max_term_size: 5000

ps_de:
  score_column: ps_score
  score_mode: top_positive
  score_quantile: 0.90
  min_selected_cells: 20
  max_control_cells: 50000
  n_top_de_genes: 200
  random_seed: 0

clustering:
  n_clusters: 20

target_random_clustering:
  deg_streams: [global_de, mixscape, mixscale]
  random_controls_match_target_count: true
  n_random_controls: 0
  min_abs_effect: 0.25
  max_pval_adj: 0.05
  rank_significant_max: 100
  top_genes_per_perturbation: 0
  min_feature_genes: 20
  assignment_logic: intersection
  mixscale_score_threshold: 0.0
  max_control_cells: 50000
  expression_normalize_target_sum: 10000
  expression_log1p: true
  heatmap_max_genes: 200
  heatmap_gene_order: variance
  volcano_max_targets: 20
  recurrent_gene_fraction: 0.25
  volcano_stream_priority: [global_de, mixscape, ps]
  linkage: average
  distance: euclidean
  random_seed: 0

postprocess:
  min_selected_cells: 20
  max_control_cells_for_de: 50000
  n_top_de_genes: 200
  random_seed: 0

audit:
  enabled: true
  require_ready: true
  require_raw_source: true

methods:
  bootstrap_install: true
  mixscape:
    enabled: true
  mixscale:
    enabled: true
    min_cells_per_perturbation: 30
    max_perturbations: 0
    max_cells: 0
    random_seed: 0
  ps:
    enabled: false
    min_cells_per_perturbation: 30
    max_perturbations: 0
    max_cells: 0
    random_seed: 0
  global_de:
    enabled: true
  ora:
    enabled: false
  comparison:
    enabled: false
  target_random_clustering:
    enabled: true

results_dir: ../results/mixscape_pipeline
conda_env: envs/preprocessing.yaml
postprocess_conda_env: envs/postprocess.yaml
r_env: envs/r_mix_methods.yaml
rscript_bin: Rscript
